<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Shop</title>
    <link rel="stylesheet" href="output.css">
</head>

<body class="bg-gradient-to-r from-blue-500 to-red-500 p-8">

    <!-- Navbar -->
    <nav class="bg-blue-900 text-white p-4 rounded flex justify-between">
        <h1 class="font-bold text-xl">E-Shop</h1>
        <ul class="flex gap-6">
            <li><a href="#">Home</a></li>
            <li><a href="#">Products</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <!-- Product Section -->
    <main class="container mx-auto bg-white p-6 rounded mt-6 flex gap-6">

        <!-- Product Image -->
        <div class="w-1/2">
            <img src="laptop.jpg" alt="Laptop" class="rounded shadow">
        </div>

        <!-- Product Details -->
        <div class="w-1/2">
            <h2 class="text-2xl font-bold mb-3">ASUS ROG Gaming Laptop</h2>

            <p class="mb-3">
                Powerful gaming laptop with Intel i7 processor,
                RTX graphics and high refresh display.
            </p>

            <h3 class="font-bold mb-2">Features</h3>
            <ul class="list-disc ml-6 mb-4">
                <li>144Hz Display</li>
                <li>RGB Keyboard</li>
                <li>16GB RAM</li>
                <li>512GB SSD</li>
            </ul>

            <label class="font-bold">Quantity</label>
            <input type="number" min="1" max="10" class="border p-2 rounded ml-3">

            <br><br>

            <button class="bg-red-500 text-white px-5 py-2 rounded hover:bg-red-600">
                Add to Cart
            </button>

        </div>

    </main>

    <footer class="text-center text-white mt-6">
        © 2025 E-Shop
    </footer>

</body>

</html>
